<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Box body -->
  <rect x="8" y="24" width="48" height="32" rx="3" ry="3" fill="#2563eb" />
  <!-- Box lid -->
  <polygon points="4,24 32,10 60,24" fill="#1d4ed8" />
  <!-- Box flap lines -->
  <line x1="32" y1="10" x2="32" y2="24" stroke="#1e40af" stroke-width="1.5" />
  <!-- Center stripe on box -->
  <rect x="26" y="30" width="12" height="8" rx="1" fill="#93c5fd" />
  <!-- Horizontal handle -->
  <rect x="28" y="33" width="8" height="2" rx="1" fill="#2563eb" />
  <!-- Barcode lines on bottom -->
  <rect x="16" y="44" width="2" height="8" fill="#bfdbfe" />
  <rect x="20" y="44" width="1" height="8" fill="#bfdbfe" />
  <rect x="23" y="44" width="2" height="8" fill="#bfdbfe" />
  <rect x="27" y="44" width="1" height="8" fill="#bfdbfe" />
  <rect x="30" y="44" width="3" height="8" fill="#bfdbfe" />
  <rect x="35" y="44" width="1" height="8" fill="#bfdbfe" />
  <rect x="38" y="44" width="2" height="8" fill="#bfdbfe" />
  <rect x="42" y="44" width="1" height="8" fill="#bfdbfe" />
  <rect x="45" y="44" width="2" height="8" fill="#bfdbfe" />
</svg>
